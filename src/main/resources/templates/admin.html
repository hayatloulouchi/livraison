<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Admin Livraison</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.header{
    background:#2c3e50;
    color:white;
    padding:20px;
    font-size:22px;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    padding:10px;
    text-align:center;
}

button{
    padding:6px 12px;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-add{
    background:#27ae60;
}

.btn-livrer{
    background:#2980b9;
}

.btn-delete{
    color:red;
    text-decoration:none;
}

input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
🚚 Admin - Gestion Livraison
</div>

<div class="container">
<div class="card">

<h3>Importer livraisons Excel</h3>

<form action="/admin/import" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button class="btn-add">Import Excel</button>
</form>

<br>

<h3>Ajouter une livraison</h3>

<form action="/admin/ajouter" method="post">
    <input type="text" name="tiers" placeholder="Tiers">
    <input type="text" name="numeroBc" placeholder="Numéro BC" required>
    <input type="text" name="client" placeholder="Client" required>
    <input type="text" name="telephone" placeholder="Téléphone">
    <input type="text" name="ville" placeholder="Ville" required>
    <input type="text" name="livreur" placeholder="Livreur">
    <input type="date" name="dateLivraison">

    <button class="btn-add">Ajouter</button>
</form>

<br>

<!-- 🔥 FILTRES -->
<h3>Recherche / Filtres</h3>

<form method="get" action="/admin">

    <input type="text" name="keyword" placeholder="Client ou BC"
           th:value="${keyword}">

    <input type="text" name="livreur" placeholder="Livreur"
           th:value="${livreur}">

    <input type="text" name="tiers" placeholder="Tiers"
           th:value="${tiers}">

    <input type="text" name="ville" placeholder="Ville"
           th:value="${ville}">

    <button class="btn-add">Filtrer</button>

</form>

<a href="/admin">
    <button type="button">🔄 Reset</button>
</a>

<br><br>

<h3>Liste des livraisons</h3>

<table border="1">

<thead>
<tr>
<th>Tiers</th>
<th>ID</th>
<th>Numéro BC</th>
<th>Client</th>
<th>Téléphone</th>
<th>Livreur</th>
<th>Ville</th>
<th>Statut</th>
<th>Date livraison</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="l : ${livraisons}">

<td th:text="${l.tiers}"></td>
<td th:text="${l.id}"></td>
<td th:text="${l.numeroBc}"></td>
<td th:text="${l.client}"></td>
<td th:text="${l.telephone}"></td>
<td th:text="${l.livreur}"></td>
<td th:text="${l.ville}"></td>

<td>
    <span th:if="${l.statut == 'EN_ATTENTE'}" style="color:orange;">EN_ATTENTE</span>
    <span th:if="${l.statut == 'TERMINEE'}" style="color:green;">TERMINEE</span>
</td>

<td th:text="${l.dateLivraison}"></td>

<td>

<form th:action="@{'/admin/livrer/' + ${l.id}}" method="post" style="display:inline;">
    <button class="btn-livrer">✔ Livré</button>
</form>

|

<a th:href="@{'/admin/edit/' + ${l.id}}">✏ Modifier</a>

|

<a th:href="@{'/admin/supprimer/' + ${l.id}}"
   onclick="return confirm('Supprimer cette livraison ?')"
   class="btn-delete">
   ❌ Supprimer
</a>

</td>

</tr>

</tbody>

</table>

</div>
</div>

</body>
</html>
